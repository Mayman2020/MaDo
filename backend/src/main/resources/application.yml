spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/madodb
    username: mado
    password: mado_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  data:
    redis:
      host: redis
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-key-change-me-super-secret-key}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

minio:
  url: ${MINIO_URL:http://minio:9000}
  access-key: minioadmin
  secret-key: minioadmin
  bucket: mado-media

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

server:
  port: 8080
