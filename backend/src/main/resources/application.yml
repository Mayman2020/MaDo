# Docker Compose / container: use application.yml defaults (service hostname `postgres`, user mado).
# Host dev: use profile `local` (see application-local.yml) — same pattern as srs-project (postgres DB + schema-only app schema).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/madodb?currentSchema=kick_live}
    username: ${SPRING_DATASOURCE_USERNAME:mado}
    password: ${SPRING_DATASOURCE_PASSWORD:mado_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET search_path TO kick_live, public
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: kick_live
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    init-sqls:
      - SET search_path TO kick_live, public
    baseline-on-migrate: true
    repair-on-migrate: true
    schemas: kick_live
    default-schema: kick_live
    create-schemas: true
  data:
    redis:
      host: redis
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-key-change-me-super-secret-key}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

minio:
  url: ${MINIO_URL:http://minio:9000}
  access-key: minioadmin
  secret-key: minioadmin
  bucket: mado-media

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

server:
  port: 8080

app:
  streaming:
    hls-base-url: ${HLS_PUBLIC_BASE_URL:http://localhost:8088/hls}
