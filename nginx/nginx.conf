worker_processes auto;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;
    notify_method get;

    application live {
      live on;
      hls on;
      hls_path /var/hls;
      hls_fragment 2s;
      hls_playlist_length 10s;
      hls_nested on;
      hls_cleanup on;

      exec_push ffmpeg -i rtmp://localhost/live/$name
        -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 9000k
          -vf scale=1920:1080 -r 60 -g 120
          -c:a aac -b:a 192k -ar 44100
          -hls_time 2 -hls_list_size 5 -hls_flags delete_segments
          -f hls /var/hls/$name/1080p/index.m3u8
        -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k
          -vf scale=1280:720 -r 60 -g 120
          -c:a aac -b:a 128k -ar 44100
          -hls_time 2 -hls_list_size 5 -hls_flags delete_segments
          -f hls /var/hls/$name/720p/index.m3u8
        -c:v libx264 -preset veryfast -b:v 1200k -maxrate 1200k -bufsize 2400k
          -vf scale=854:480 -r 30 -g 60
          -c:a aac -b:a 96k -ar 44100
          -hls_time 2 -hls_list_size 5 -hls_flags delete_segments
          -f hls /var/hls/$name/480p/index.m3u8
        -c:v libx264 -preset veryfast -b:v 600k -maxrate 600k -bufsize 1200k
          -vf scale=640:360 -r 30 -g 60
          -c:a aac -b:a 64k -ar 44100
          -hls_time 2 -hls_list_size 5 -hls_flags delete_segments
          -f hls /var/hls/$name/360p/index.m3u8 2>>/var/log/ffmpeg-$name.log;

      exec_push sh -c 'sleep 5 && cat > /var/hls/$name/index.m3u8 << EOF
#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=4500000,RESOLUTION=1920x1080,CODECS="avc1.640028,mp4a.40.2"
1080p/index.m3u8
#EXT-X-STREAM-INF:BANDWIDTH=2500000,RESOLUTION=1280x720,CODECS="avc1.64001f,mp4a.40.2"
720p/index.m3u8
#EXT-X-STREAM-INF:BANDWIDTH=1200000,RESOLUTION=854x480,CODECS="avc1.64001e,mp4a.40.2"
480p/index.m3u8
#EXT-X-STREAM-INF:BANDWIDTH=600000,RESOLUTION=640x360,CODECS="avc1.64001e,mp4a.40.2"
360p/index.m3u8
EOF';

      on_publish http://backend:8080/api/streams/on-publish;
      on_publish_done http://backend:8080/api/streams/on-publish-done;
      on_play http://backend:8080/api/streams/on-play;
    }
  }
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8088;

    location /hls {
      root /var;
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      add_header Cache-Control no-cache;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Headers *;
    }

    location /stat {
      rtmp_stat all;
      rtmp_stat_stylesheet stat.xsl;
    }
  }
}
